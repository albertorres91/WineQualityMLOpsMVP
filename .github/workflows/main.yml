name: Wine Quality CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - prod
  workflow_dispatch:

jobs:
  train_and_test:
    name: Train Model & Run Tests
    runs-on: ubuntu-latest
    outputs:
      test_status: ${{ steps.run_model_tests.outcome }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_dev.txt

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Run training script (uploads model and scaler to S3)
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          S3_MODEL_KEY_ONNX: "wine_quality_model.onnx"
          S3_SCALER_KEY: "wine_quality_scaler.joblib"
        run: python scripts/train.py

      - name: Run model tests (downloads from S3)
        id: run_model_tests
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          S3_MODEL_KEY_ONNX: "wine_quality_model.onnx"
          S3_SCALER_KEY: "wine_quality_scaler.joblib"
          S3_TEST_FEATURES_KEY: "test_data/test_features.csv"
          S3_TEST_LABELS_KEY: "test_data/test_labels.csv"
        run: python scripts/model_tester.py

  build_and_deploy:
    name: Build Docker Image & Deploy to Lambda
    runs-on: ubuntu-latest
    needs: train_and_test
    if: needs.train_and_test.outputs.test_status == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Determine Lambda Function Name and Environment
        id: det_env
        run: |
          if [ "${{ github.ref_name }}" == "dev" ]; then
            echo "LAMBDA_FUNCTION_NAME_CURRENT=wineQualityApi-dev" >> $GITHUB_ENV
            echo "ENVIRONMENT_TAG_SUFFIX=dev" >> $GITHUB_ENV
          elif [ "${{ github.ref_name }}" == "prod" ]; then
            echo "LAMBDA_FUNCTION_NAME_CURRENT=wineQualityApi-prod" >> $GITHUB_ENV
            echo "ENVIRONMENT_TAG_SUFFIX=prod" >> $GITHUB_ENV
          else
            echo "Branch no configurada para despliegue."
            exit 1
          fi
          echo "IMAGE_TAG_COMMIT=${{ github.sha }}" >> $GITHUB_ENV
          echo "ECR_REGISTRY_URI=${{ steps.login-ecr.outputs.registry }}" >> $GITHUB_ENV
          echo "ECR_REPOSITORY_NAME=mlops-proj" >> $GITHUB_ENV # Nombre de tu repo ECR

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ env.ECR_REGISTRY_URI }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY_NAME }}
          IMAGE_TAG_LATEST: latest-${{ env.ENVIRONMENT_TAG_SUFFIX }}
          IMAGE_TAG_COMMIT_ENV: ${{ env.IMAGE_TAG_COMMIT }}-${{ env.ENVIRONMENT_TAG_SUFFIX }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG_LATEST -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG_COMMIT_ENV ./app
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG_LATEST
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG_COMMIT_ENV
          echo "Pushed to $ECR_REGISTRY/$ECR_REPOSITORY with tags $IMAGE_TAG_LATEST and $IMAGE_TAG_COMMIT_ENV"

      - name: Update Lambda Function
        env:
          LAMBDA_FUNCTION_TO_UPDATE: ${{ env.LAMBDA_FUNCTION_NAME_CURRENT }}
          ECR_IMAGE_URI_WITH_TAG: ${{ env.ECR_REGISTRY_URI }}/${{ env.ECR_REPOSITORY_NAME }}:${{ env.IMAGE_TAG_LATEST }}
        run: |
          echo "Updating Lambda function: $LAMBDA_FUNCTION_TO_UPDATE with image $ECR_IMAGE_URI_WITH_TAG"
          aws lambda update-function-code \
            --function-name $LAMBDA_FUNCTION_TO_UPDATE \
            --image-uri $ECR_IMAGE_URI_WITH_TAG
          echo "Lambda function update initiated."