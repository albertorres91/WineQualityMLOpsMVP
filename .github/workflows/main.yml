name: Wine Quality CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - prod
  workflow_dispatch: {}

jobs:
  tests_suite:
    name: Run Unit and Model Integration Tests
    runs-on: ubuntu-latest
    outputs:
      # La salida del job tests_suite es simplemente su resultado general.
      # El siguiente job usará needs.tests_suite.result == 'success'.
      # No es necesario un output específico aquí si el 'if' del siguiente job es robusto.
      _placeholder: "to ensure outputs are processed" # Placeholder si no hay otros outputs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies (including pytest)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_dev.txt

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Run Unit Tests with Pytest
        id: run_unit_tests
        run: pytest tests/

      - name: Run model integration tests (downloads from S3)
        id: run_model_integration_tests
        if: steps.run_unit_tests.outcome == 'success'
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          S3_MODEL_KEY_ONNX: "wine_quality_model.onnx"
          S3_SCALER_KEY: "wine_quality_scaler.joblib"
          S3_TEST_FEATURES_KEY: "test_data/test_features.csv"
          S3_TEST_LABELS_KEY: "test_data/test_labels.csv"
        run: python scripts/model_tester.py

  build_and_push_ecr: # Job para construir y pushear la imagen a ECR, común para ambos entornos
    name: Build & Push Docker Image to ECR
    runs-on: ubuntu-latest
    needs: tests_suite
    if: needs.tests_suite.result == 'success'
    outputs:
      ecr_image_latest_tagged: ${{ steps.docker_meta.outputs.ecr_image_latest_tagged }}
      ecr_image_commit_tagged: ${{ steps.docker_meta.outputs.ecr_image_commit_tagged }}
      ecr_registry_uri: ${{ steps.docker_meta.outputs.ecr_registry_uri }} # Para login en EC2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker image tags based on branch
        id: docker_meta
        run: |
          ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          ECR_REPOSITORY="mlops-proj" # Tu nombre de repositorio ECR
          IMAGE_TAG_SUFFIX=""

          if [ "${{ github.ref_name }}" == "dev" ]; then
            IMAGE_TAG_SUFFIX="dev-ec2"
          elif [ "${{ github.ref_name }}" == "prod" ]; then
            IMAGE_TAG_SUFFIX="prod-lambda"
          else
            echo "::error::Branch no configurada para etiquetado de imagen: ${{ github.ref_name }}"
            exit 1
          fi
          
          IMAGE_TAG_LATEST="latest-${IMAGE_TAG_SUFFIX}"
          IMAGE_TAG_COMMIT="${{ github.sha }}-${IMAGE_TAG_SUFFIX}"

          echo "ecr_image_latest_tagged=${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG_LATEST}" >> $GITHUB_OUTPUT
          echo "ecr_image_commit_tagged=${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG_COMMIT}" >> $GITHUB_OUTPUT
          echo "ecr_registry_uri=${ECR_REGISTRY}" >> $GITHUB_OUTPUT # Para login en EC2

      - name: Build and push Docker image to ECR
        run: |
          docker build -t ${{ steps.docker_meta.outputs.ecr_image_latest_tagged }} -t ${{ steps.docker_meta.outputs.ecr_image_commit_tagged }} ./app
          docker push ${{ steps.docker_meta.outputs.ecr_image_latest_tagged }}
          docker push ${{ steps.docker_meta.outputs.ecr_image_commit_tagged }}
          echo "Pushed to ECR with tags ${{ steps.docker_meta.outputs.ecr_image_latest_tagged }} and ${{ steps.docker_meta.outputs.ecr_image_commit_tagged }}"

  deploy_dev_to_ec2:
    name: Deploy to Dev EC2 Instance
    runs-on: ubuntu-latest
    needs: build_and_push_ecr # Depende de que la imagen esté en ECR
    if: github.ref_name == 'dev' # Solo para la rama dev

    steps:
      - name: Configure AWS Credentials # Aunque el rol de EC2 lo maneja, el login ECR en EC2 lo puede usar
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }} # No estrictamente necesario si el rol de EC2 tiene todo
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }} # No estrictamente necesario
          aws-region: us-east-2

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_EC2_HOST }} # 52.15.68.156
          username: ${{ secrets.DEV_EC2_USERNAME }} # ubuntu
          key: ${{ secrets.DEV_EC2_SSH_KEY }}
          port: 22
          script: |
            set -e
            echo "INFO: Conectado a EC2 Dev (${{ secrets.DEV_EC2_HOST }})"
            aws ecr get-login-password --region us-east-2 | docker login --username AWS --password-stdin ${{ needs.build_and_push_ecr.outputs.ecr_registry_uri }}
            echo "INFO: Docker login a ECR exitoso en EC2."
            
            docker stop wine-api-dev-container || echo "WARN: Contenedor wine-api-dev-container no encontrado o no se pudo detener."
            docker rm wine-api-dev-container || echo "WARN: Contenedor wine-api-dev-container no encontrado o no se pudo eliminar."
            
            echo "INFO: Haciendo pull de la nueva imagen ${{ needs.build_and_push_ecr.outputs.ecr_image_latest_tagged }}..."
            docker pull ${{ needs.build_and_push_ecr.outputs.ecr_image_latest_tagged }}
            
            echo "INFO: Ejecutando el nuevo contenedor..."
            docker run -d \
              -p 8000:8000 \
              -e S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }} \
              -e S3_MODEL_KEY_ONNX="wine_quality_model.onnx" \
              -e S3_SCALER_KEY="wine_quality_scaler.joblib" \
              -e PREDICTION_LOG_KEY_PREFIX="predictions/wine_quality" \
              -e ENVIRONMENT_NAME="dev-ec2" \
              --name wine-api-dev-container \
              ${{ needs.build_and_push_ecr.outputs.ecr_image_latest_tagged }}
            
            echo "INFO: Contenedor desplegado y ejecutándose en EC2 Dev."
            sleep 10
            docker logs --tail 20 wine-api-dev-container
            echo "INFO: Despliegue a EC2 Dev completado."

  deploy_prod_to_lambda:
    name: Deploy to Prod Lambda
    runs-on: ubuntu-latest
    needs: build_and_push_ecr # Depende de que la imagen esté en ECR
    if: github.ref_name == 'prod' # Solo para la rama prod

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Update Prod Lambda Function
        run: |
          LAMBDA_FUNCTION_TO_UPDATE="wineQualityApi-prod" # Nombre fijo para prod
          ECR_IMAGE_URI_WITH_TAG="${{ needs.build_and_push_ecr.outputs.ecr_image_latest_tagged }}" # Usa la imagen con etiqueta latest-prod-lambda

          echo "Updating Lambda function: $LAMBDA_FUNCTION_TO_UPDATE with image $ECR_IMAGE_URI_WITH_TAG"
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION_TO_UPDATE" \
            --image-uri "$ECR_IMAGE_URI_WITH_TAG"
          echo "Lambda function update initiated."