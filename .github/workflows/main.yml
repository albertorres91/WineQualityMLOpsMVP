name: Wine Quality CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - prod
  workflow_dispatch:

jobs:
  train_and_test:
    name: Train Model & Run Tests
    runs-on: ubuntu-latest
    outputs:
      test_status: ${{ steps.run_model_tests.outcome }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_dev.txt

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Run training script (uploads model and scaler to S3)
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          S3_MODEL_KEY_ONNX: "wine_quality_model.onnx"
          S3_SCALER_KEY: "wine_quality_scaler.joblib"
        run: python scripts/train.py

      - name: Run model tests (downloads from S3)
        id: run_model_tests
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          S3_MODEL_KEY_ONNX: "wine_quality_model.onnx"
          S3_SCALER_KEY: "wine_quality_scaler.joblib"
          S3_TEST_FEATURES_KEY: "test_data/test_features.csv"
          S3_TEST_LABELS_KEY: "test_data/test_labels.csv"
        run: python scripts/model_tester.py

  build_and_deploy:
    name: Build Docker Image & Deploy to Lambda
    runs-on: ubuntu-latest
    needs: train_and_test
    if: needs.train_and_test.outputs.test_status == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        # ... (sin cambios) ...

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up environment variables for deployment
        id: set_env_vars # Damos un id a este paso
        run: |
          IMAGE_TAG_SUFFIX=""
          LAMBDA_FUNCTION_NAME=""
          if [ "${{ github.ref_name }}" == "dev" ]; then
            LAMBDA_FUNCTION_NAME="wineQualityApi-dev"
            IMAGE_TAG_SUFFIX="dev"
          elif [ "${{ github.ref_name }}" == "prod" ]; then
            LAMBDA_FUNCTION_NAME="wineQualityApi-prod"
            IMAGE_TAG_SUFFIX="prod"
          else
            echo "::error::Branch no configurada para despliegue."
            exit 1
          fi
          
          # Establecer salidas para este paso
          echo "lambda_function_name=${LAMBDA_FUNCTION_NAME}" >> $GITHUB_OUTPUT
          echo "image_tag_latest=latest-${IMAGE_TAG_SUFFIX}" >> $GITHUB_OUTPUT
          echo "image_tag_commit=${{ github.sha }}-${IMAGE_TAG_SUFFIX}" >> $GITHUB_OUTPUT
          echo "ecr_registry=${{ steps.login-ecr.outputs.registry }}" >> $GITHUB_OUTPUT
          echo "ecr_repository_name=mlops-proj" >> $GITHUB_OUTPUT

      - name: Build, tag, and push image to Amazon ECR
        run: |
          ECR_REGISTRY="${{ steps.set_env_vars.outputs.ecr_registry }}"
          ECR_REPOSITORY="${{ steps.set_env_vars.outputs.ecr_repository_name }}"
          TAG_LATEST="${{ steps.set_env_vars.outputs.image_tag_latest }}"
          TAG_COMMIT="${{ steps.set_env_vars.outputs.image_tag_commit }}"

          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$TAG_LATEST -t $ECR_REGISTRY/$ECR_REPOSITORY:$TAG_COMMIT ./app
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$TAG_LATEST
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$TAG_COMMIT
          echo "Pushed to $ECR_REGISTRY/$ECR_REPOSITORY with tags $TAG_LATEST and $TAG_COMMIT"

      - name: Update Lambda Function
        run: |
          LAMBDA_FUNCTION_TO_UPDATE="${{ steps.set_env_vars.outputs.lambda_function_name }}"
          ECR_IMAGE_URI_WITH_TAG="${{ steps.set_env_vars.outputs.ecr_registry }}/${{ steps.set_env_vars.outputs.ecr_repository_name }}:${{ steps.set_env_vars.outputs.image_tag_latest }}"

          echo "Updating Lambda function: $LAMBDA_FUNCTION_TO_UPDATE with image $ECR_IMAGE_URI_WITH_TAG"
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION_TO_UPDATE" \
            --image-uri "$ECR_IMAGE_URI_WITH_TAG"
          echo "Lambda function update initiated."