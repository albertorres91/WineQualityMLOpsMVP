name: Wine Quality CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - prod
  workflow_dispatch: {} # Permite ejecución manual

jobs:
  tests_suite: # Job renombrado para incluir todas las pruebas
    name: Run Unit and Model Integration Tests
    runs-on: ubuntu-latest
    outputs:
      # Esta salida indicará si todas las pruebas (unitarias Y de modelo) pasaron.
      # Asumimos que si model_tests no se ejecuta (porque unit_tests falló), 
      # su 'outcome' no será 'success', haciendo que all_tests_passed sea false.
      # O, más explícito, podemos comprobar ambos outcomes.
      all_tests_passed: ${{ (steps.run_unit_tests.outcome == 'success') && (steps.run_model_integration_tests.outcome == 'success' || steps.run_unit_tests.outcome != 'success') }}
      # Explicación de la lógica de all_tests_passed:
      # - Ambas deben ser 'success'.
      # - O, si unit_tests NO fue 'success', entonces model_integration_tests no se ejecuta,
      #   y queremos que all_tests_passed sea false. La segunda parte de la OR (||) asegura esto.
      # Alternativa más simple si model_integration_tests no se ejecuta si unit_tests falla:
      # all_tests_passed: ${{ steps.run_model_integration_tests.outcome == 'success' }}
      # Pero para ser explícitos con el requerimiento de que las pruebas unitarias deben pasar:
      # Optaremos por una lógica que el 'if' del siguiente job pueda manejar fácilmente.
      # La condición 'if' en el siguiente job se simplificará.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies (including pytest)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_dev.txt # Asegúrate que pytest esté en este archivo

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2 # Tu región

      - name: Run Unit Tests with Pytest
        id: run_unit_tests
        run: pytest tests/ # pytest buscará y ejecutará tests en la carpeta tests/

      - name: Run model integration tests (downloads from S3)
        id: run_model_integration_tests # ID actualizado para claridad
        # Solo ejecutar si las pruebas unitarias pasaron
        if: steps.run_unit_tests.outcome == 'success'
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          S3_MODEL_KEY_ONNX: "wine_quality_model.onnx"
          S3_SCALER_KEY: "wine_quality_scaler.joblib"
          S3_TEST_FEATURES_KEY: "test_data/test_features.csv"
          S3_TEST_LABELS_KEY: "test_data/test_labels.csv"
          # MINIMUM_ACCURACY_THRESHOLD: "0.70" # Puedes pasar esto como env var si quieres o si el script lo lee
        run: python scripts/model_tester.py
        # El script model_tester.py saldrá con código 1 si los tests fallan

  build_and_deploy:
    name: Build Docker Image & Deploy to Lambda
    runs-on: ubuntu-latest
    needs: tests_suite # Depende del job renombrado
    # Ejecutar solo si AMBAS pruebas (unitaria y de modelo) fueron exitosas.
    # Si run_unit_tests falla, run_model_integration_tests no se ejecuta (debido a su 'if'),
    # pero su 'outcome' no sería 'success'. Necesitamos asegurar que build_and_deploy
    # solo corra si run_unit_tests fue 'success' Y run_model_integration_tests fue 'success'.
    # El 'if' del paso run_model_integration_tests ya maneja la dependencia de las pruebas unitarias.
    # Entonces, solo necesitamos que run_model_integration_tests sea 'success'.
    # Si run_unit_tests falla, el job tests_suite fallará en ese punto, y build_and_deploy no correrá.
    # Si run_unit_tests pasa, pero run_model_integration_tests falla, el job tests_suite fallará, y build_and_deploy no correrá.
    # Por lo tanto, podemos simplificar la condición aquí o ser muy explícitos.
    # Para cumplir el requisito de que "el push desde dev haya pasado unas pruebas unitarias":
    if: needs.tests_suite.result == 'success' # El job 'tests_suite' completo debe ser exitoso

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up environment variables for deployment
        id: set_env_vars
        run: |
          IMAGE_TAG_SUFFIX=""
          LAMBDA_FUNCTION_NAME=""
          if [ "${{ github.ref_name }}" == "dev" ]; then
            LAMBDA_FUNCTION_NAME="wineQualityApi-dev"
            IMAGE_TAG_SUFFIX="dev"
          elif [ "${{ github.ref_name }}" == "prod" ]; then
            LAMBDA_FUNCTION_NAME="wineQualityApi-prod"
            IMAGE_TAG_SUFFIX="prod"
          else
            echo "::error::Branch no configurada para despliegue: ${{ github.ref_name }}"
            exit 1
          fi
          
          echo "lambda_function_name=${LAMBDA_FUNCTION_NAME}" >> $GITHUB_OUTPUT
          echo "image_tag_latest=latest-${IMAGE_TAG_SUFFIX}" >> $GITHUB_OUTPUT
          echo "image_tag_commit=${{ github.sha }}-${IMAGE_TAG_SUFFIX}" >> $GITHUB_OUTPUT
          echo "ecr_registry=${{ steps.login-ecr.outputs.registry }}" >> $GITHUB_OUTPUT
          echo "ecr_repository_name=mlops-proj" >> $GITHUB_OUTPUT

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.set_env_vars.outputs.ecr_registry }}
          ECR_REPOSITORY: ${{ steps.set_env_vars.outputs.ecr_repository_name }}
          TAG_LATEST: ${{ steps.set_env_vars.outputs.image_tag_latest }}
          TAG_COMMIT: ${{ steps.set_env_vars.outputs.image_tag_commit }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$TAG_LATEST -t $ECR_REGISTRY/$ECR_REPOSITORY:$TAG_COMMIT ./app
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$TAG_LATEST
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$TAG_COMMIT
          echo "Pushed to $ECR_REGISTRY/$ECR_REPOSITORY with tags $TAG_LATEST and $TAG_COMMIT"

      - name: Update Lambda Function
        env:
          LAMBDA_FUNCTION_TO_UPDATE: ${{ steps.set_env_vars.outputs.lambda_function_name }}
          ECR_IMAGE_URI_WITH_TAG: "${{ steps.set_env_vars.outputs.ecr_registry }}/${{ steps.set_env_vars.outputs.ecr_repository_name }}:${{ steps.set_env_vars.outputs.image_tag_latest }}"
        run: |
          echo "Updating Lambda function: $LAMBDA_FUNCTION_TO_UPDATE with image $ECR_IMAGE_URI_WITH_TAG"
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION_TO_UPDATE" \
            --image-uri "$ECR_IMAGE_URI_WITH_TAG"
          echo "Lambda function update initiated."